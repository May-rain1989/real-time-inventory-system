                message: Inventory transferred successfully
                data:
                  sourceInventory:
                    id: cmsourceinventory001
                    productId: cmnipustk0001v9mghxodgqvm
                    warehouseId: cmnipvcsv0003v9mgdphtlyvb
                    onHand: 70
                    reserved: 0
                    createdAt: '2026-04-03T10:28:32.580Z'
                    updatedAt: '2026-04-03T12:00:00.000Z'
                    available: 70
                  targetInventory:
                    id: cmtargetinventory001
                    productId: cmnipustk0001v9mghxodgqvm
                    warehouseId: cmnipv5xq0002v9mgpxi5fsoa
                    onHand: 40
                    reserved: 0
                    createdAt: '2026-04-03T10:28:32.580Z'
                    updatedAt: '2026-04-03T12:00:00.000Z'
                    available: 40
                  transaction:
                    id: cmntransfer001
                    type: TRANSFER
                    productId: cmnipustk0001v9mghxodgqvm
                    warehouseId: cmnipvcsv0003v9mgdphtlyvb
                    sourceWarehouseId: cmnipvcsv0003v9mgdphtlyvb
                    targetWarehouseId: cmnipv5xq0002v9mgpxi5fsoa
                    quantity: 10
                    beforeOnHand: 80
                    afterOnHand: 70
                    beforeReserved: 0
                    afterReserved: 0
