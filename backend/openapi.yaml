openapi: 3.0.3
info:
  title: Real-Time Inventory Management API
  version: 1.0.1
  description: API documentation for the backend service.

servers:
  - url: http://localhost:4000

security: []

tags:
  - name: Health
  - name: Auth
  - name: Products
  - name: Warehouses
  - name: Inventory

paths:
  /health:
    get:
      summary: Health check
      tags: [Health]
      security: []
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: ok

  /auth/register:
    post:
      summary: Register a user
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
            example:
              email: admin@example.com
              password: secret123
              role: ADMIN
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
              example:
                message: User registered successfully
                user:
                  id: cmuser001
                  email: admin@example.com
                  role: ADMIN
                  createdAt: '2026-04-04T10:00:00.000Z'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Invalid email format
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Email already registered
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Internal server error

  /auth/login:
    post:
      summary: Login user
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
            example:
              email: admin@example.com
              password: secret123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                message: Login successful
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example
                user:
                  id: cmuser001
                  email: admin@example.com
                  role: ADMIN
                  createdAt: '2026-04-04T10:00:00.000Z'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Password is required
        '401':
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Invalid email or password
        '500':
          description: JWT secret missing or internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: JWT_SECRET is not configured

  /auth/me:
    get:
      summary: Get current authenticated user
      description: Requires authentication.
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
              example:
                id: cmuser001
                email: admin@example.com
                role: ADMIN
                createdAt: '2026-04-04T10:00:00.000Z'
                updatedAt: '2026-04-04T10:00:00.000Z'
        '401':
          description: Unauthorized or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingHeader:
                  value:
                    message: Missing or invalid authorization header
                invalidToken:
                  value:
                    message: Invalid or expired token
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: User not found

  /products:
    get:
      summary: List products
      description: Requires authentication.
      tags: [Products]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Products returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProductsResponse'
              example:
                products:
                  - id: cmprod001
                    name: Demo Product
                    sku: DEMO-SKU-001
                    description: Demo product description
                    unit: pcs
                    createdAt: '2026-04-04T10:10:00.000Z'
                    updatedAt: '2026-04-04T10:10:00.000Z'
        '401':
          description: Unauthorized or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingHeader:
                  value:
                    message: Missing or invalid authorization header
                invalidToken:
                  value:
                    message: Invalid or expired token
    post:
      summary: Create product
      description: Requires authentication and ADMIN role.
      tags: [Products]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductInput'
            example:
              name: Demo Product
              sku: DEMO-SKU-001
              description: Demo product description
              unit: pcs
      responses:
        '201':
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductMutationResponse'
              example:
                message: Product created successfully
                product:
                  id: cmprod001
                  name: Demo Product
                  sku: DEMO-SKU-001
                  description: Demo product description
                  unit: pcs
                  createdAt: '2026-04-04T10:10:00.000Z'
                  updatedAt: '2026-04-04T10:10:00.000Z'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingHeader:
                  value:
                    message: Missing or invalid authorization header
                invalidToken:
                  value:
                    message: Invalid or expired token
        '403':
          description: Forbidden - ADMIN role required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Forbidden
        '409':
          description: SKU already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: SKU already exists

  /products/{id}:
    get:
      summary: Get product by ID
      description: Requires authentication.
      tags: [Products]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Product returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProductResponse'
              example:
                product:
                  id: cmprod001
                  name: Demo Product
                  sku: DEMO-SKU-001
                  description: Demo product description
                  unit: pcs
                  createdAt: '2026-04-04T10:10:00.000Z'
                  updatedAt: '2026-04-04T10:10:00.000Z'
        '401':
          description: Unauthorized or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingHeader:
                  value:
                    message: Missing or invalid authorization header
                invalidToken:
                  value:
                    message: Invalid or expired token
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Product not found
    patch:
      summary: Update product
      description: Requires authentication and ADMIN role.
      tags: [Products]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductInput'
            example:
              name: Demo Product Updated
              sku: DEMO-SKU-002
              description: Updated description
              unit: box
      responses:
        '200':
          description: Product updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductMutationResponse'
              example:
                message: Product updated successfully
                product:
                  id: cmprod001
                  name: Demo Product Updated
                  sku: DEMO-SKU-002
                  description: Updated description
                  unit: box
                  createdAt: '2026-04-04T10:10:00.000Z'
                  updatedAt: '2026-04-04T11:00:00.000Z'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingHeader:
                  value:
                    message: Missing or invalid authorization header
                invalidToken:
                  value:
                    message: Invalid or expired token
        '403':
          description: Forbidden - ADMIN role required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Forbidden
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Product not found
        '409':
          description: SKU already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: SKU already exists
    delete:
      summary: Delete product
      description: Requires authentication and ADMIN role.
      tags: [Products]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Product deleted successfully
        '401':
          description: Unauthorized or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingHeader:
                  value:
                    message: Missing or invalid authorization header
                invalidToken:
                  value:
                    message: Invalid or expired token
        '403':
          description: Forbidden - ADMIN role required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Forbidden
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Product not found

  /warehouses:
    get:
      summary: List warehouses
      description: Requires authentication.
      tags: [Warehouses]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Warehouses returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetWarehousesResponse'
              example:
                warehouses:
                  - id: cmwh001
                    name: Main Warehouse
                    code: WH-A
                    location: Adelaide
                    createdAt: '2026-04-04T10:20:00.000Z'
                    updatedAt: '2026-04-04T10:20:00.000Z'
        '401':
          description: Unauthorized or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingHeader:
                  value:
                    message: Missing or invalid authorization header
                invalidToken:
                  value:
                    message: Invalid or expired token
    post:
      summary: Create warehouse
      description: Requires authentication and ADMIN role.
      tags: [Warehouses]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWarehouseInput'
            example:
              name: Main Warehouse
              code: WH-A
              location: Adelaide
      responses:
        '201':
          description: Warehouse created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarehouseMutationResponse'
              example:
                message: Warehouse created successfully
                warehouse:
                  id: cmwh001
                  name: Main Warehouse
                  code: WH-A
                  location: Adelaide
                  createdAt: '2026-04-04T10:20:00.000Z'
                  updatedAt: '2026-04-04T10:20:00.000Z'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingHeader:
                  value:
                    message: Missing or invalid authorization header
                invalidToken:
                  value:
                    message: Invalid or expired token
        '403':
          description: Forbidden - ADMIN role required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Forbidden
        '409':
          description: Warehouse code already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Warehouse code already exists

  /warehouses/{id}:
    get:
      summary: Get warehouse by ID
      description: Requires authentication.
      tags: [Warehouses]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Warehouse returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetWarehouseResponse'
              example:
                warehouse:
                  id: cmwh001
                  name: Main Warehouse
                  code: WH-A
                  location: Adelaide
                  createdAt: '2026-04-04T10:20:00.000Z'
                  updatedAt: '2026-04-04T10:20:00.000Z'
        '401':
          description: Unauthorized or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingHeader:
                  value:
                    message: Missing or invalid authorization header
                invalidToken:
                  value:
                    message: Invalid or expired token
        '404':
          description: Warehouse not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Warehouse not found
    patch:
      summary: Update warehouse
      description: Requires authentication and ADMIN role.
      tags: [Warehouses]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWarehouseInput'
            example:
              name: Secondary Warehouse
              code: WH-B
              location: Melbourne
      responses:
        '200':
          description: Warehouse updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarehouseMutationResponse'
              example:
                message: Warehouse updated successfully
                warehouse:
                  id: cmwh001
                  name: Secondary Warehouse
                  code: WH-B
                  location: Melbourne
                  createdAt: '2026-04-04T10:20:00.000Z'
                  updatedAt: '2026-04-04T11:30:00.000Z'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingHeader:
                  value:
                    message: Missing or invalid authorization header
                invalidToken:
                  value:
                    message: Invalid or expired token
        '403':
          description: Forbidden - ADMIN role required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Forbidden
        '404':
          description: Warehouse not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Warehouse not found
        '409':
          description: Warehouse code already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Warehouse code already exists
    delete:
      summary: Delete warehouse
      description: Requires authentication and ADMIN role.
      tags: [Warehouses]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Warehouse deleted successfully
        '401':
          description: Unauthorized or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingHeader:
                  value:
                    message: Missing or invalid authorization header
                invalidToken:
                  value:
                    message: Invalid or expired token
        '403':
          description: Forbidden - ADMIN role required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Forbidden
        '404':
          description: Warehouse not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Warehouse not found

  /inventory:
    get:
      summary: Get inventory list
      description: Requires authentication.
      tags: [Inventory]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Inventory list returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetInventoryResponse'
              example:
                inventory:
                  - id: cmnirggjo0005v9mgoqn53con
                    productId: cmnipustk0001v9mghxodgqvm
                    warehouseId: cmnipvcsv0003v9mgdphtlyvb
                    onHand: 77
                    reserved: 2
                    createdAt: '2026-04-03T10:28:32.580Z'
                    updatedAt: '2026-04-03T16:29:15.373Z'
                    available: 75
                    product:
                      id: cmnipustk0001v9mghxodgqvm
                      name: Demo Product
                      sku: DEMO-SKU-001
                      unit: pcs
                    warehouse:
                      id: cmnipvcsv0003v9mgdphtlyvb
                      name: Main Warehouse
                      code: WH-A
                      location: Adelaide
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingHeader:
                  value:
                    message: Missing or invalid authorization header
                invalidToken:
                  value:
                    message: Invalid or expired token

  /inventory/transactions:
    get:
      summary: Get inventory transactions
      description: Requires authentication.
      tags: [Inventory]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Inventory transactions returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetTransactionsResponse'
              example:
                transactions:
                  - id: cmnj4cc8d0007v9kg2de8ujjj
                    type: COMMIT_OUT
                    productId: cmnipustk0001v9mghxodgqvm
                    warehouseId: cmnipvcsv0003v9mgdphtlyvb
                    sourceWarehouseId: null
                    targetWarehouseId: null
                    quantity: 3
                    beforeOnHand: 80
                    afterOnHand: 77
                    beforeReserved: 5
                    afterReserved: 2
                    reference: COM-TEST
                    note: Commit test
                    createdById: cmnipnkxg0000v9mgm9e326um
                    createdAt: '2026-04-03T16:29:15.373Z'
                    product:
                      id: cmnipustk0001v9mghxodgqvm
                      name: Demo Product
                      sku: DEMO-SKU-001
                    warehouse:
                      id: cmnipvcsv0003v9mgdphtlyvb
                      name: Main Warehouse
                      code: WH-A
                    sourceWarehouse: null
                    targetWarehouse: null
                    createdBy:
                      id: cmnipnkxg0000v9mgm9e326um
                      email: staff@example.com
                      role: STAFF
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingHeader:
                  value:
                    message: Missing or invalid authorization header
                invalidToken:
                  value:
                    message: Invalid or expired token

  /inventory/increase:
    post:
      summary: Increase inventory
      description: Requires authentication.
      tags: [Inventory]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IncreaseInventoryInput'
            example:
              productId: cmnipustk0001v9mghxodgqvm
              warehouseId: cmnipvcsv0003v9mgdphtlyvb
              quantity: 20
              reference: PO-001
              note: Initial stock in
      responses:
        '200':
          description: Inventory increased successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryMutationResponse'
              example:
                message: Inventory increased successfully
                data:
                  inventory:
                    id: cmnirggjo0005v9mgoqn53con
                    productId: cmnipustk0001v9mghxodgqvm
                    warehouseId: cmnipvcsv0003v9mgdphtlyvb
                    onHand: 100
                    reserved: 0
                    createdAt: '2026-04-03T10:28:32.580Z'
                    updatedAt: '2026-04-03T10:40:00.000Z'
                    available: 100
                  transaction:
                    id: cmnstockin001
                    type: STOCK_IN
                    productId: cmnipustk0001v9mghxodgqvm
                    warehouseId: cmnipvcsv0003v9mgdphtlyvb
                    sourceWarehouseId: null
                    targetWarehouseId: null
                    quantity: 20
                    beforeOnHand: 80
                    afterOnHand: 100
                    beforeReserved: 0
                    afterReserved: 0
                    reference: PO-001
                    note: Initial stock in
                    createdById: cmnipnkxg0000v9mgm9e326um
                    createdAt: '2026-04-03T10:40:00.000Z'
        '400':
          description: Validation failed or invalid quantity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Validation failed
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingHeader:
                  value:
                    message: Missing or invalid authorization header
                invalidToken:
                  value:
                    message: Invalid or expired token
        '404':
          description: Product or warehouse not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Product not found

  /inventory/decrease:
    post:
      summary: Decrease inventory
      description: Requires authentication.
      tags: [Inventory]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecreaseInventoryInput'
            example:
              productId: cmnipustk0001v9mghxodgqvm
              warehouseId: cmnipvcsv0003v9mgdphtlyvb
              quantity: 5
              reference: SO-001
              note: Customer order
      responses:
        '200':
          description: Inventory decreased successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryMutationResponse'
              example:
                message: Inventory decreased successfully
                data:
                  inventory:
                    id: cmnirggjo0005v9mgoqn53con
                    productId: cmnipustk0001v9mghxodgqvm
                    warehouseId: cmnipvcsv0003v9mgdphtlyvb
                    onHand: 75
                    reserved: 0
                    createdAt: '2026-04-03T10:28:32.580Z'
                    updatedAt: '2026-04-03T11:00:00.000Z'
                    available: 75
                  transaction:
                    id: cmnstockout001
                    type: STOCK_OUT
                    productId: cmnipustk0001v9mghxodgqvm
                    warehouseId: cmnipvcsv0003v9mgdphtlyvb
                    sourceWarehouseId: null
                    targetWarehouseId: null
                    quantity: 5
                    beforeOnHand: 80
                    afterOnHand: 75
                    beforeReserved: 0
                    afterReserved: 0
                    reference: SO-001
                    note: Customer order
                    createdById: cmnipnkxg0000v9mgm9e326um
                    createdAt: '2026-04-03T11:00:00.000Z'
        '400':
          description: Validation failed or insufficient available stock
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Insufficient available stock
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingHeader:
                  value:
                    message: Missing or invalid authorization header
                invalidToken:
                  value:
                    message: Invalid or expired token
        '404':
          description: Product, warehouse, or inventory record not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Inventory record not found

  /inventory/transfer:
    post:
      summary: Transfer inventory between warehouses
      description: Requires authentication.
      tags: [Inventory]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferInventoryInput'
            example:
              productId: cmnipustk0001v9mghxodgqvm
              sourceWarehouseId: cmnipvcsv0003v9mgdphtlyvb
              targetWarehouseId: cmnipv5xq0002v9mgpxi5fsoa
              quantity: 10
              reference: TR-001
              note: Rebalance stock
      responses:
        '200':
          description: Inventory transferred successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferInventoryResponse'
