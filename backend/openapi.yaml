              productId: cmnipustk0001v9mghxodgqvm
              warehouseId: cmnipvcsv0003v9mgdphtlyvb
              quantity: 10
              reference: RES-001
              note: Reserve stock for order #1001
      responses:
        '200':
          description: Inventory reserved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryMutationResponse'
