                invalidToken:
                  value:
                    message: Invalid or expired token
        '404':
          description: Product, warehouse, or source inventory record not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Source inventory record not found

  /inventory/reserve:
    post:
      summary: Reserve inventory
      description: Requires authentication. Reserve available stock without changing physical on-hand quantity.
      tags: [Inventory]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReserveInventoryInput'
