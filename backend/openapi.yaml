        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingHeader:
                  value:
                    message: Missing or invalid authorization header
                invalidToken:
                  value:
                    message: Invalid or expired token
        '404':
          description: Product, warehouse, or inventory record not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Inventory record not found

  /inventory/release:
    post:
      summary: Release reserved inventory
      description: Requires authentication. Release previously reserved stock without changing physical on-hand quantity.
      tags: [Inventory]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseInventoryInput'
            example:
              productId: cmnipustk0001v9mghxodgqvm
              warehouseId: cmnipvcsv0003v9mgdphtlyvb
              quantity: 5
              reference: REL-001
              note: Order cancelled
      responses:
        '200':
          description: Inventory released successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryMutationResponse'
              example:
                message: Inventory released successfully
                data:
                  inventory:
                    id: cmnirggjo0005v9mgoqn53con
                    productId: cmnipustk0001v9mghxodgqvm
                    warehouseId: cmnipvcsv0003v9mgdphtlyvb
                    onHand: 80
                    reserved: 5
                    createdAt: '2026-04-03T10:28:32.580Z'
                    updatedAt: '2026-04-03T16:28:59.500Z'
                    available: 75
                  transaction:
                    id: cmnj4bzzg0005v9kg9r0kdudn
                    type: RELEASE
                    productId: cmnipustk0001v9mghxodgqvm
                    warehouseId: cmnipvcsv0003v9mgdphtlyvb
                    sourceWarehouseId: null
                    targetWarehouseId: null
                    quantity: 5
                    beforeOnHand: 80
                    afterOnHand: 80
                    beforeReserved: 10
                    afterReserved: 5
                    reference: REL-001
                    note: Order cancelled
                    createdById: cmnipnkxg0000v9mgm9e326um
                    createdAt: '2026-04-03T16:28:59.500Z'
        '400':
          description: Validation failed or release quantity exceeds reserved stock
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Cannot release more than reserved stock
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingHeader:
                  value:
                    message: Missing or invalid authorization header
                invalidToken:
                  value:
                    message: Invalid or expired token
        '404':
          description: Product, warehouse, or inventory record not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Inventory record not found

  /inventory/commit-reserved:
    post:
      summary: Commit reserved inventory to stock out
      description: Requires authentication. Convert reserved stock into an actual stock-out operation by decreasing both reserved and on-hand quantities.
      tags: [Inventory]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommitReservedInventoryInput'
            example:
              productId: cmnipustk0001v9mghxodgqvm
              warehouseId: cmnipvcsv0003v9mgdphtlyvb
              quantity: 3
              reference: COM-001
              note: Ship reserved stock
      responses:
        '200':
          description: Reserved inventory committed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryMutationResponse'
              example:
                message: Reserved inventory committed successfully
                data:
                  inventory:
                    id: cmnirggjo0005v9mgoqn53con
                    productId: cmnipustk0001v9mghxodgqvm
                    warehouseId: cmnipvcsv0003v9mgdphtlyvb
                    onHand: 77
                    reserved: 2
                    createdAt: '2026-04-03T10:28:32.580Z'
                    updatedAt: '2026-04-03T16:29:15.373Z'
                    available: 75
                  transaction:
                    id: cmnj4cc8d0007v9kg2de8ujjj
                    type: COMMIT_OUT
                    productId: cmnipustk0001v9mghxodgqvm
                    warehouseId: cmnipvcsv0003v9mgdphtlyvb
                    sourceWarehouseId: null
                    targetWarehouseId: null
                    quantity: 3
                    beforeOnHand: 80
                    afterOnHand: 77
                    beforeReserved: 5
                    afterReserved: 2
                    reference: COM-001
                    note: Ship reserved stock
                    createdById: cmnipnkxg0000v9mgm9e326um
                    createdAt: '2026-04-03T16:29:15.373Z'
        '400':
          description: Validation failed or commit quantity exceeds reserved stock
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Cannot commit more than reserved stock
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingHeader:
                  value:
                    message: Missing or invalid authorization header
                invalidToken:
                  value:
                    message: Invalid or expired token
        '404':
          description: Product, warehouse, or inventory record not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Inventory record not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Send a JWT access token in the Authorization header as `Bearer <token>`.

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      description: Resource ID
      schema:
        type: string

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
      required: [status]

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    Role:
      type: string
      enum: [ADMIN, STAFF]

    UserPublic:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/Role'
        createdAt:
          type: string
          format: date-time
      required: [id, email, role, createdAt]

    UserProfile:
      allOf:
        - $ref: '#/components/schemas/UserPublic'
        - type: object
          properties:
            updatedAt:
              type: string
              format: date-time
          required: [updatedAt]

    RegisterInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        role:
          $ref: '#/components/schemas/Role'

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1

    RegisterResponse:
      type: object
      properties:
        message:
          type: string
        user:
          $ref: '#/components/schemas/UserPublic'
      required: [message, user]

    LoginResponse:
      type: object
      properties:
        message:
          type: string
        token:
          type: string
        user:
          $ref: '#/components/schemas/UserPublic'
      required: [message, token, user]

    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        sku:
          type: string
        description:
          type: string
          nullable: true
        unit:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, sku, createdAt, updatedAt]

    CreateProductInput:
      type: object
      required: [name, sku]
      properties:
        name:
          type: string
          minLength: 1
        sku:
          type: string
          minLength: 1
        description:
          type: string
        unit:
          type: string

    UpdateProductInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        sku:
          type: string
          minLength: 1
        description:
          type: string
        unit:
          type: string

    ProductMutationResponse:
      type: object
      properties:
        message:
          type: string
        product:
          $ref: '#/components/schemas/Product'
      required: [message, product]

    GetProductsResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: '#/components/schemas/Product'
      required: [products]

    GetProductResponse:
      type: object
      properties:
        product:
          $ref: '#/components/schemas/Product'
      required: [product]

    Warehouse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        code:
          type: string
        location:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, code, createdAt, updatedAt]

    CreateWarehouseInput:
      type: object
      required: [name, code]
      properties:
        name:
          type: string
          minLength: 1
        code:
          type: string
          minLength: 1
        location:
          type: string

    UpdateWarehouseInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        code:
          type: string
          minLength: 1
        location:
          type: string

    WarehouseMutationResponse:
      type: object
      properties:
        message:
          type: string
        warehouse:
          $ref: '#/components/schemas/Warehouse'
      required: [message, warehouse]

    GetWarehousesResponse:
      type: object
      properties:
        warehouses:
          type: array
          items:
            $ref: '#/components/schemas/Warehouse'
      required: [warehouses]

    GetWarehouseResponse:
      type: object
      properties:
        warehouse:
          $ref: '#/components/schemas/Warehouse'
      required: [warehouse]

    InventoryType:
      type: string
      enum:
        - STOCK_IN
        - STOCK_OUT
        - TRANSFER
        - ADJUSTMENT
        - RESERVE
        - RELEASE
        - COMMIT_OUT

    InventoryRecord:
      type: object
      properties:
        id:
          type: string
        productId:
          type: string
        warehouseId:
          type: string
        onHand:
          type: integer
        reserved:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        available:
          type: integer
      required:
        - id
        - productId
        - warehouseId
        - onHand
        - reserved
        - createdAt
        - updatedAt
        - available

    ProductSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        sku:
          type: string
        unit:
          type: string
          nullable: true
      required: [id, name, sku]

    WarehouseSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        code:
          type: string
        location:
          type: string
          nullable: true
      required: [id, name, code]

    WarehouseLiteSummary:
      type: object
      nullable: true
      properties:
        id:
          type: string
        name:
          type: string
        code:
          type: string

    UserSummary:
      type: object
      nullable: true
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/Role'

    InventoryTransaction:
      type: object
      properties:
        id:
          type: string
        type:
          $ref: '#/components/schemas/InventoryType'
        productId:
          type: string
        warehouseId:
          type: string
          nullable: true
        sourceWarehouseId:
          type: string
          nullable: true
        targetWarehouseId:
          type: string
          nullable: true
        quantity:
          type: integer
        beforeOnHand:
          type: integer
        afterOnHand:
          type: integer
        beforeReserved:
          type: integer
        afterReserved:
          type: integer
        reference:
          type: string
          nullable: true
        note:
          type: string
          nullable: true
        createdById:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - productId
        - quantity
        - beforeOnHand
        - afterOnHand
        - beforeReserved
        - afterReserved
        - createdById
        - createdAt

    InventoryTransactionWithRelations:
      allOf:
        - $ref: '#/components/schemas/InventoryTransaction'
        - type: object
          properties:
            product:
              type: object
              properties:
                id:
                  type: string
                name:
                  type: string
                sku:
                  type: string
            warehouse:
              $ref: '#/components/schemas/WarehouseLiteSummary'
            sourceWarehouse:
              $ref: '#/components/schemas/WarehouseLiteSummary'
            targetWarehouse:
              $ref: '#/components/schemas/WarehouseLiteSummary'
            createdBy:
              $ref: '#/components/schemas/UserSummary'

    InventoryWithRelations:
      allOf:
        - $ref: '#/components/schemas/InventoryRecord'
        - type: object
          properties:
            product:
              $ref: '#/components/schemas/ProductSummary'
            warehouse:
              $ref: '#/components/schemas/WarehouseSummary'

    InventoryMutationData:
      type: object
      properties:
        inventory:
          $ref: '#/components/schemas/InventoryRecord'
        transaction:
          $ref: '#/components/schemas/InventoryTransaction'
      required: [inventory, transaction]

    InventoryMutationResponse:
      type: object
      properties:
        message:
          type: string
        data:
          $ref: '#/components/schemas/InventoryMutationData'
      required: [message, data]

    TransferInventoryData:
      type: object
      properties:
        sourceInventory:
          $ref: '#/components/schemas/InventoryRecord'
        targetInventory:
          $ref: '#/components/schemas/InventoryRecord'
        transaction:
          $ref: '#/components/schemas/InventoryTransaction'
      required: [sourceInventory, targetInventory, transaction]

    TransferInventoryResponse:
      type: object
      properties:
        message:
          type: string
        data:
          $ref: '#/components/schemas/TransferInventoryData'
      required: [message, data]

    GetInventoryResponse:
      type: object
      properties:
        inventory:
          type: array
          items:
            $ref: '#/components/schemas/InventoryWithRelations'
      required: [inventory]

    GetTransactionsResponse:
      type: object
      properties:
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/InventoryTransactionWithRelations'
      required: [transactions]

    IncreaseInventoryInput:
      type: object
      required:
        - productId
        - warehouseId
        - quantity
      properties:
        productId:
          type: string
          description: Product ID
        warehouseId:
          type: string
          description: Warehouse ID
        quantity:
          type: integer
          minimum: 1
          description: Quantity to add
        reference:
          type: string
          description: Optional business reference
        note:
          type: string
          description: Optional note

    DecreaseInventoryInput:
      type: object
      required:
        - productId
        - warehouseId
        - quantity
      properties:
        productId:
          type: string
          description: Product ID
        warehouseId:
          type: string
          description: Warehouse ID
        quantity:
          type: integer
          minimum: 1
          description: Quantity to subtract from available stock
        reference:
          type: string
        note:
          type: string

    TransferInventoryInput:
      type: object
      required:
        - productId
        - sourceWarehouseId
        - targetWarehouseId
        - quantity
      properties:
        productId:
          type: string
        sourceWarehouseId:
          type: string
        targetWarehouseId:
          type: string
        quantity:
          type: integer
          minimum: 1
        reference:
          type: string
        note:
          type: string

    ReserveInventoryInput:
      type: object
      required:
        - productId
        - warehouseId
        - quantity
      properties:
        productId:
          type: string
          description: Product ID
        warehouseId:
          type: string
          description: Warehouse ID
        quantity:
          type: integer
          minimum: 1
          description: Quantity to reserve from available stock
        reference:
          type: string
          description: Optional business reference
        note:
          type: string
          description: Optional note

    ReleaseInventoryInput:
      type: object
      required:
        - productId
        - warehouseId
        - quantity
      properties:
        productId:
          type: string
          description: Product ID
        warehouseId:
          type: string
          description: Warehouse ID
        quantity:
          type: integer
          minimum: 1
          description: Quantity to release from reserved stock
        reference:
          type: string
          description: Optional business reference
        note:
          type: string
          description: Optional note

    CommitReservedInventoryInput:
      type: object
      required:
        - productId
        - warehouseId
        - quantity
      properties:
        productId:
          type: string
          description: Product ID
        warehouseId:
          type: string
          description: Warehouse ID
        quantity:
          type: integer
          minimum: 1
          description: Quantity to convert from reserved stock into actual stock out
        reference:
          type: string
          description: Optional business reference
        note:
          type: string
          description: Optional note
